site_name: getBamDepth
site_url: https://github.com/maurya-anand/getBamDepth
repo_url: https://github.com/maurya-anand/getBamDepth
edit_uri: edit/main/docs/
theme:
  name: material
  palette:
    scheme: default
    primary: blue grey
    accent: blue
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Inputs: inputs.md
  - Output: output.md
  - Method: method.md
  - Validation and errors: validation.md
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
extra_css:
  - stylesheets/extra.css
